CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Split BLE must be enabled
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

CONFIG_ZMK_IDLE_TIMEOUT=8000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
CONFIG_ZMK_PM_SOFT_OFF=y

CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306_DEFAULT_CONTRAST=51
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y


# --- Battery ---
CONFIG_NICE_OLED_WIDGET_BATTERY_FONT_FAMILY_JUA=y
CONFIG_NICE_OLED_WIDGET_BATTERY_FONT_12=y
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_Y=0
  
# --- Bluetooth icon (was Y=32) ---
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_X=5
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_Y=16
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_UNBONDED_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_UNBONDED_CUSTOM_Y=16

# --- Profile Number ---
CONFIG_NICE_OLED_WIDGET_PROFILE_TEXT_CUSTOM_X=18
CONFIG_NICE_OLED_WIDGET_PROFILE_TEXT_CUSTOM_Y=25

# --- USB icon (same as BT Y=32) ---
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_Y=16

# --- Profile (was Y=137) ---
#HIDDEN, 34 default
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_X=128 
#HIDDEN, 0 default
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=32  

# --- Layer (was Y=146) ---
CONFIG_NICE_OLED_WIDGET_LAYER_FONT_FAMILY_JUA=y
CONFIG_NICE_OLED_WIDGET_LAYER_FONT_16=y
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_X=31
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=0

# --- Capslock indicator ---
CONFIG_NICE_OLED_WIDGET_CAPSLOCK_INDICATOR=y
CONFIG_NICE_OLED_WIDGET_CAPSLOCK_INDICATOR_CUSTOM_X=73
CONFIG_NICE_OLED_WIDGET_CAPSLOCK_INDICATOR_CUSTOM_Y=2

# --- Modifiers (was Y=100) ---
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_HOR=y
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_X=27
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_Y=18
 
# --- Time ---
CONFIG_NICE_OLED_WIDGET_RAW_HID=y
# Show on peripheral
CONFIG_NICE_OLED_WIDGET_RAW_HID_DRIVER=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_PERIPHERAL=y

CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CENTRAL=n
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CUSTOM_X=65
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CUSTOM_Y=13
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_TWO_ROWS=y


# --- Bongo Cat (was Luna X=65) ---
#CONFIG_NICE_OLED_WIDGET_BONGO_CAT_CUSTOM_X=97
#CONFIG_NICE_OLED_WIDGET_BONGO_CAT_CUSTOM_Y=-8
CONFIG_NICE_OLED_WIDGET_WPM_BONGO_CAT=n
CONFIG_NICE_OLED_WIDGET_WPM_RAVEN=y
CONFIG_NICE_OLED_WIDGET_RAVEN_CUSTOM_X=95
CONFIG_NICE_OLED_WIDGET_RAVEN_CUSTOM_Y=0

CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_MACOS=n
CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_FIXED_SYMBOL_WINDOWS=y
#CONFIG_NICE_OLED_WIDGET_MODIFIERS_INDICATORS_BONGO_CAT=y
 
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Turn on logging, and set ZMK logging to debug output
CONFIG_ZMK_USB_LOGGING=y
