CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_IDLE_TIMEOUT=15000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000
CONFIG_ZMK_PM_SOFT_OFF=y

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# --- Bluetooth icon (was Y=32, now leftmost at X=0) ---
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_CUSTOM_Y=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_USB_CUSTOM_Y=0

# --- Battery (was Y=50, now at X=20) ---
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_X=20
CONFIG_NICE_OLED_WIDGET_BATTERY_CUSTOM_Y=0

# --- Bongo Cat (was Luna X=65, now at X=40) ---
CONFIG_NICE_OLED_WIDGET_BONGO_CAT_CUSTOM_X=40
CONFIG_NICE_OLED_WIDGET_BONGO_CAT_CUSTOM_Y=0

# --- Modifiers (was Y=100, now at X=65) ---
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_X=65
CONFIG_NICE_OLED_WIDGET_MODIFIERS_CUSTOM_Y=0

# --- Profile (was Y=137, now at X=90) ---
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_X=90
CONFIG_NICE_OLED_WIDGET_PROFILE_CUSTOM_Y=0
CONFIG_NICE_OLED_WIDGET_PROFILE_TEXT_CUSTOM_X=100
CONFIG_NICE_OLED_WIDGET_PROFILE_TEXT_CUSTOM_Y=0

# --- Layer (was Y=146, now at X=110) ---
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_X=110
CONFIG_NICE_OLED_WIDGET_LAYER_CUSTOM_Y=0

CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Turn on logging, and set ZMK logging to debug output
# CONFIG_ZMK_USB_LOGGING=y
