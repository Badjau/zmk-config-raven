CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

CONFIG_ZMK_IDLE_TIMEOUT=15000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_PM_SOFT_OFF=y

CONFIG_ZMK_DISPLAY=y
CONFIG_SSD1306_DEFAULT_CONTRAST=51
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

CONFIG_NICE_OLED_WIDGET_BATTERY_FONT_FAMILY_JUA=y
CONFIG_NICE_OLED_WIDGET_BATTERY_FONT_12=y

# test, move out of view
# default already y: NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_RAVEN=y
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_X=61
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_Y=0

CONFIG_NICE_OLED_WIDGET_BATTERY_PERIPHERAL_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_BATTERY_PERIPHERAL_CUSTOM_Y=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_PERIPHERAL_CUSTOM_X=5
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_PERIPHERAL_CUSTOM_Y=16

CONFIG_NICE_OLED_WIDGET_RAW_HID_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_TWO_ROWS=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_FONT_FAMILY_DESIGNER=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_FONT_18=y
# if jua, use CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_FONT_16=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CUSTOM_X=30
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CUSTOM_Y=0


CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Turn on logging, and set ZMK logging to debug output
CONFIG_ZMK_USB_LOGGING=y
