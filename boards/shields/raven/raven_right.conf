CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

CONFIG_ZMK_IDLE_TIMEOUT=15000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_PM_SOFT_OFF=y

CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# test, move out of view
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_X=200
CONFIG_NICE_OLED_WIDGET_ANIMATION_PERIPHERAL_CUSTOM_Y=64

CONFIG_NICE_OLED_WIDGET_BATTERY_PERIPHERAL_CUSTOM_X=0
CONFIG_NICE_OLED_WIDGET_BATTERY_PERIPHERAL_CUSTOM_Y=0
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_PERIPHERAL_CUSTOM_X=5
CONFIG_NICE_OLED_WIDGET_OUTPUT_BT_PERIPHERAL_CUSTOM_Y=16

CONFIG_NICE_OLED_WIDGET_RAW_HID_PERIPHERAL=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_TWO_ROWS=n
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_FONT_22=y
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CUSTOM_X=31
CONFIG_NICE_OLED_WIDGET_RAW_HID_TIME_CUSTOM_Y=0


CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Turn on logging, and set ZMK logging to debug output
CONFIG_ZMK_USB_LOGGING=y
